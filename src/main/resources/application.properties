spring.application.name=user-service-api

server.port=8081

spring.datasource.url=jdbc:mysql://mysqldb:3306/travel_ease_user_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=travel_ease_user
spring.datasource.password=user1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

spring.sql.init.mode=never
spring.sql.init.platform=mysql

spring.kafka.bootstrap-servers=kafka-service:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.properties.spring.json.add.type.headers=false


spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak-service:8080/realms/hotel-management-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak-service:8080/realms/hotel-management-realm/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.token-uri=http://keycloak-service:8080/realms/hotel-management-realm/protocol/openid-connect/token
public.key.string=classpath:public.key
keycloak.realm=hotel-management-realm
keycloak.auth-server-url=http://keycloak-service:8080
keycloak.admin-username=admin
keycloak.admin-password=admin1234
keycloak.client-id=travel-ease-client
keycloak.client-secret=oPS6cULiIToQExM1F3hMIEg07LRx5lkG


app.email.verification.expiry-minutes=30
app.email.verification.base-url=http://localhost:3000/verify-email

app.password.reset.expiry-minutes=15
app.password.reset.base-url=http://localhost:3000/reset-password

app.otp.max-attempts=5
app.otp.resend-cooldown-seconds=60

logging.level.root=INFO
logging.level.com.ticketbooking.userservice=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security.oauth2=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

accessKey=ACCESS_KEY
secret=SECRET
bucketName=travel-ease-user-profile
region=ap-southeast-1


spring.kafka.topics.send-otp=otp-send




