apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-deployment
  labels: 
    app: user-service
spec:
  replicas: 2
  selector: 
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service-container
        image: travel_ease_user_service:v1
        env:
          - name: KEYCLOAK_CLIENT_SECRET
            value: FqVvzbUiCQzjLQuGzOBD83bSh4Po3v5e
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081